<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Defender - Minimalist Strategy</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --panel-color: rgba(20, 20, 35, 0.9);
            --accent-color: #00f2ff;
            --text-color: #e0e0e0;
            --health-color: #ff4d4d;
            --money-color: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* --- UI OVERLAY --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content:间-between;
        }

        #top-bar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .stat-box {
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #money-display { color: var(--money-color); }
        #health-display { color: var(--health-color); }

        /* --- SHOP / BOTTOM BAR --- */
        #bottom-bar {
            pointer-events: auto;
            background: var(--panel-color);
            border-top: 2px solid var(--accent-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        .tower-btn {
            background: #1a1a2e;
            border: 1px solid #444;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
            border-radius: 4px;
        }

        .tower-btn:hover { border-color: var(--accent-color); background: #252545; }
        .tower-btn.selected { border-color: var(--accent-color); box-shadow: 0 0 15px var(--accent-color); background: #252545; }
        .tower-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #222; }

        .btn-cost { font-size: 0.8rem; color: var(--money-color); margin-top: 5px; }

        #tooltip {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            border: 1px solid var(--accent-color);
            max-width: 300px;
            text-align: center;
        }

        /* --- MENUS --- */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
        }

        .hidden { display: none !important; }

        h1 { font-size: 3rem; margin-bottom: 10px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 5px; }
        
        button.primary-btn {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }

        button.primary-btn:hover { transform: scale(1.05); background: #fff; }

    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="top-bar">
            <div class="stat-box" id="money-display">Credits: 200</div>
            <div class="stat-box" id="health-display">Core Health: 100</div>
            <div class="stat-box" id="score-display">Enemies Neutralized: 0</div>
        </div>

        <div id="tooltip">Select a unit to defend the core</div>

        <div id="bottom-bar">
            <button class="tower-btn" onclick="selectTower(0)" id="btn-0">
                <span>Sniper</span>
                <span class="btn-cost">50¢</span>
            </button>
            <button class="tower-btn" onclick="selectTower(1)" id="btn-1">
                <span>Blast</span>
                <span class="btn-cost">75¢</span>
            </button>
            <button class="tower-btn" onclick="selectTower(2)" id="btn-2">
                <span>Temporal</span>
                <span class="btn-cost">100¢</span>
            </button>
        </div>
    </div>

    <div id="overlay">
        <h1 id="msg-title">CORE DEFENDER</h1>
        <p id="msg-stats"></p>
        <button class="primary-btn" onclick="startGame()">INITIALIZE MISSION</button>
    </div>

<script>
/**
 * CORE DEFENDER ENGINE
 * Built with Vanilla JS & HTML5 Canvas
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiMoney = document.getElementById('money-display');
const uiHealth = document.getElementById('health-display');
const uiScore = document.getElementById('score-display');
const tooltip = document.getElementById('tooltip');
const overlay = document.getElementById('overlay');

// Game State
let gameState = {
    running: false,
    money: 200,
    health: 100,
    score: 0,
    timeElapsed: 0,
    lastTime: 0,
    spawnRate: 2000, // ms
    lastSpawn: 0,
    selectedTowerIndex: null,
    mouse: { x: 0, y: 0 }
};

// Configuration
const TOWERS_DATA = [
    { name: "Sniper", cost: 50, range: 250, damage: 40, fireRate: 1000, color: '#00f2ff', type: 'single', desc: "Long range, high damage, single target." },
    { name: "Blast", cost: 75, range: 120, damage: 20, fireRate: 1500, color: '#ff8800', type: 'aoe', aoeRadius: 60, desc: "Moderate range, deals damage in a small radius." },
    { name: "Temporal", cost: 100, range: 150, damage: 1, fireRate: 500, color: '#aa00ff', type: 'slow', slowFactor: 0.5, desc: "Support unit: drastically slows nearby enemies." }
];

let enemies = [];
let towers = [];
let projectiles = [];
let particles = [];

// --- INITIALIZATION ---

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

function startGame() {
    enemies = [];
    towers = [];
    projectiles = [];
    gameState.money = 200;
    gameState.health = 100;
    gameState.score = 0;
    gameState.timeElapsed = 0;
    gameState.spawnRate = 2000;
    gameState.running = true;
    overlay.classList.add('hidden');
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameState.running = false;
    overlay.classList.remove('hidden');
    document.getElementById('msg-title').innerText = "CORE BREACHED";
    document.getElementById('msg-stats').innerHTML = `
        Survival Time: ${Math.floor(gameState.timeElapsed)}s<br>
        Enemies Destroyed: ${gameState.score}<br>
        <strong style="color: gold">Total Score: ${Math.floor(gameState.score * 10 + gameState.timeElapsed)}</strong>
    `;
    document.querySelector('.primary-btn').innerText = "RETRY SYSTEM";
}

// --- UTILITIES ---

function getDist(x1, y1, x2, y2) {
    return Math.hypot(x2 - x1, y2 - y1);
}

function selectTower(idx) {
    if (gameState.money >= TOWERS_DATA[idx].cost) {
        gameState.selectedTowerIndex = idx;
        tooltip.innerText = TOWERS_DATA[idx].desc;
        // Visual feedback for buttons
        document.querySelectorAll('.tower-btn').forEach((b, i) => {
            b.classList.toggle('selected', i === idx);
        });
    }
}

// --- GAME OBJECTS ---

class Enemy {
    constructor() {
        // Spawn on a random point outside the screen circle
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.max(canvas.width, canvas.height) * 0.6;
        this.x = canvas.width / 2 + Math.cos(angle) * radius;
        this.y = canvas.height / 2 + Math.sin(angle) * radius;
        
        this.baseSpeed = 0.8 + (gameState.timeElapsed / 100);
        this.speed = this.baseSpeed;
        this.hp = 50 + (gameState.timeElapsed * 0.5);
        this.maxHp = this.hp;
        this.size = 12;
        this.flash = 0;
        this.isSlowed = false;
    }

    update() {
        // Calculate vector to center
        const dx = (canvas.width / 2) - this.x;
        const dy = (canvas.height / 2) - this.y;
        const dist = Math.hypot(dx, dy);
        
        // Move towards center
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;

        if (this.flash > 0) this.flash -= 0.1;
        
        // Reset slow effect every frame unless tower reapplies it
        this.speed = this.baseSpeed; 
        
        // Check collision with core
        if (dist < 30) {
            gameState.health -= 10;
            this.hp = 0; // Destroy enemy
            createExplosion(this.x, this.y, '#ff4d4d');
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.fillStyle = this.flash > 0 ? '#fff' : '#ff4d4d';
        
        // Draw triangle pointing to center
        const angle = Math.atan2((canvas.height/2) - this.y, (canvas.width/2) - this.x);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(-8, -7);
        ctx.lineTo(-8, 7);
        ctx.closePath();
        ctx.fill();

        // HP Bar
        ctx.rotate(-angle);
        ctx.fillStyle = '#444';
        ctx.fillRect(-10, -15, 20, 3);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(-10, -15, (this.hp / this.maxHp) * 20, 3);
        ctx.restore();
    }
}

class Tower {
    constructor(x, y, data) {
        this.x = x;
        this.y = y;
        this.data = { ...data };
        this.lastFire = 0;
        this.target = null;
    }

    update(now) {
        // Find target
        this.target = null;
        let closestDist = this.data.range;

        for (let enemy of enemies) {
            let d = getDist(this.x, this.y, enemy.x, enemy.y);
            if (d < closestDist) {
                closestDist = d;
                this.target = enemy;
            }
            
            // If it's a slowing tower, apply aura
            if (this.data.type === 'slow' && d < this.data.range) {
                enemy.speed *= this.data.slowFactor;
            }
        }

        // Fire
        if (this.target && now - this.lastFire > this.data.fireRate) {
            this.fire();
            this.lastFire = now;
        }
    }

    fire() {
        if (this.data.type === 'single') {
            projectiles.push(new Projectile(this.x, this.y, this.target, this.data));
        } else if (this.data.type === 'aoe') {
            // Instant hit for AOE visual
            createExplosion(this.target.x, this.target.y, this.data.color, this.data.aoeRadius);
            enemies.forEach(e => {
                if (getDist(this.target.x, this.target.y, e.x, e.y) < this.data.aoeRadius) {
                    e.hp -= this.data.damage;
                    e.flash = 1;
                }
            });
        } else if (this.data.type === 'slow') {
             // Visual zap for slow
             projectiles.push(new Projectile(this.x, this.y, this.target, this.data, true));
        }
    }

    draw() {
        ctx.save();
        // Glow
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.data.color;
        
        // Base
        ctx.fillStyle = '#333';
        ctx.fillRect(this.x - 15, this.y - 15, 30, 30);
        ctx.strokeStyle = this.data.color;
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x - 15, this.y - 15, 30, 30);

        // Turret Head
        ctx.translate(this.x, this.y);
        if (this.target) {
            ctx.rotate(Math.atan2(this.target.y - this.y, this.target.x - this.x));
        }
        ctx.fillStyle = this.data.color;
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(0, -3, 15, 6);
        ctx.restore();
    }
}

class Projectile {
    constructor(x, y, target, data, isBeam = false) {
        this.x = x; this.y = y;
        this.target = target;
        this.data = data;
        this.speed = 7;
        this.dead = false;
        this.isBeam = isBeam;
        this.life = 0.2; // For beam duration
    }

    update() {
        if (this.isBeam) {
            this.life -= 0.02;
            if (this.life <= 0) this.dead = true;
            return;
        }

        const dx = this.target.x - this.x;
        const dy = this.target.y - this.y;
        const dist = Math.hypot(dx, dy);

        if (dist < 10) {
            this.target.hp -= this.data.damage;
            this.target.flash = 1;
            this.dead = true;
            return;
        }

        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
    }

    draw() {
        ctx.strokeStyle = this.data.color;
        ctx.lineWidth = this.isBeam ? 2 : 4;
        ctx.beginPath();
        if (this.isBeam) {
            ctx.globalAlpha = this.life * 5;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.target.x, this.target.y);
        } else {
            ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
    }
}

function createExplosion(x, y, color, radius = 30) {
    for (let i = 0; i < 10; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 1.0,
            color
        });
    }
}

// --- ENGINE ---

function update(now) {
    gameState.timeElapsed += 1/60;

    // Spawning logic
    if (now - gameState.lastSpawn > gameState.spawnRate) {
        enemies.push(new Enemy());
        gameState.lastSpawn = now;
        // Accelerate spawning over time
        gameState.spawnRate = Math.max(400, 2000 - (gameState.timeElapsed * 10));
    }

    enemies.forEach((e, i) => {
        e.update();
        if (e.hp <= 0) {
            createExplosion(e.x, e.y, '#fff');
            gameState.money += 15;
            gameState.score++;
            enemies.splice(i, 1);
        }
    });

    towers.forEach(t => t.update(now));

    projectiles.forEach((p, i) => {
        p.update();
        if (p.dead) projectiles.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    });

    if (gameState.health <= 0) gameOver();

    // UI Updates
    uiMoney.innerText = `Credits: ${Math.floor(gameState.money)}¢`;
    uiHealth.innerText = `Core Integrity: ${Math.max(0, gameState.health)}%`;
    uiScore.innerText = `Neut: ${gameState.score}`;

    // Update buttons availability
    TOWERS_DATA.forEach((t, i) => {
        document.getElementById(`btn-${i}`).disabled = gameState.money < t.cost;
    });
}

function draw() {
    ctx.fillStyle = 'rgba(10, 10, 18, 0.3)'; // Trail effect
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw Grid (Subtle)
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1;
    for(let x=0; x<canvas.width; x+=50) {
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for(let y=0; y<canvas.height; y+=50) {
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // Central Core
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    
    // Core Outer Glow
    let grad = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 40);
    grad.addColorStop(0, '#00f2ff');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(centerX, centerY, 40, 0, Math.PI*2);
    ctx.fill();

    // Core Body
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(centerX, centerY, 15 + Math.sin(Date.now()/200)*3, 0, Math.PI*2);
    ctx.fill();

    // Draw Objects
    enemies.forEach(e => e.draw());
    towers.forEach(t => t.draw());
    projectiles.forEach(p => p.draw());
    
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2, 2);
        ctx.globalAlpha = 1;
    });

    // Placement Preview
    if (gameState.selectedTowerIndex !== null) {
        const tower = TOWERS_DATA[gameState.selectedTowerIndex];
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = tower.color;
        ctx.arc(gameState.mouse.x, gameState.mouse.y, tower.range, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = tower.color;
        ctx.fillRect(gameState.mouse.x - 15, gameState.mouse.y - 15, 30, 30);
        ctx.globalAlpha = 1;
    }
}

function gameLoop(now) {
    if (!gameState.running) return;
    update(now);
    draw();
    requestAnimationFrame(gameLoop);
}

// --- INPUTS ---

window.addEventListener('mousemove', (e) => {
    gameState.mouse.x = e.clientX;
    gameState.mouse.y = e.clientY;
});

canvas.addEventListener('mousedown', () => {
    if (gameState.selectedTowerIndex !== null) {
        const data = TOWERS_DATA[gameState.selectedTowerIndex];
        
        // Check overlap with other towers
        const overlapping = towers.some(t => getDist(t.x, t.y, gameState.mouse.x, gameState.mouse.y) < 40);
        // Check overlap with core
        const nearCore = getDist(canvas.width/2, canvas.height/2, gameState.mouse.x, gameState.mouse.y) < 60;

        if (gameState.money >= data.cost && !overlapping && !nearCore) {
            towers.push(new Tower(gameState.mouse.x, gameState.mouse.y, data));
            gameState.money -= data.cost;
            
            // Clear selection if Shift not held
            gameState.selectedTowerIndex = null;
            document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
            tooltip.innerText = "Select a unit to defend the core";
        }
    }
});

// Cancel selection on Right Click
window.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    gameState.selectedTowerIndex = null;
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
});

</script>
</body>
</html>
